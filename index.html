<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Party</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h2 { margin: 20px; }

.box { width: 90%; max-width: 1200px; }

.top { margin: 10px; }

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

.layout {
  display: flex;
  gap: 15px;
  margin-top: 15px;
}

#video {
  flex: 3;
  width: 100%;
  height: 450px;
  border-radius: 12px;
  border: none;
  background: black;
}

#chatContainer {
  flex: 1;
  height: 450px;
  display: flex;
  flex-direction: column;
  background: #15151c;
  border-radius: 12px;
  overflow: hidden;
}

#chatBox {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 10px;
  background: #333;
}
</style>
</head>

<body>

<h2>Watch Party 🎬</h2>

<div class="box">

  <div class="top">
    <input id="videoUrl" placeholder="Incolla link Google Drive">
    <button onclick="setVideo()">Carica film</button>
  </div>

  <div class="layout">

    <iframe id="video"></iframe>

    <div id="chatContainer">
      <div id="chatBox"></div>

      <div>
        <input id="msg" placeholder="messaggio">
        <button onclick="sendMsg()">send</button>
      </div>
    </div>

  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAc3uiIwTm4cructeGnlg2GJk_ocAx_6yQ",
  authDomain: "watch-party-af0e4.firebaseapp.com",
  databaseURL: "https://watch-party-af0e4-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "watch-party-af0e4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const room = db.ref("rooms/cinema");

const video = document.getElementById("video");

/* ================= VIDEO ================= */

function setVideo() {

  const url = document.getElementById("videoUrl").value;

  const match = url.match(/\/d\/(.*?)\//);

  if (!match) {
    alert("Link non valido");
    return;
  }

  const id = match[1];

  const embed = `https://drive.google.com/file/d/${id}/preview`;

  video.src = embed;

  room.set({
    url: embed,
    action: "pause",
    time: 0,
    updatedAt: Date.now()
  });
}

/* ================= SYNC ================= */

let sync = false;

video.addEventListener("load", () => {});

room.on("value", snap => {

  const d = snap.val();
  if (!d) return;

  sync = true;

  if (d.url && video.src !== d.url) {
    video.src = d.url;
  }

  if (d.action === "play") {
    video.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
  }

  if (d.action === "pause") {
    video.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
  }

  sync = false;
});

/* ================= CHAT ================= */

let username = prompt("Username:");
if (!username) username = "guest";

function sendMsg() {
  const text = document.getElementById("msg").value;
  if (!text.trim()) return;

  room.child("chat").push({
    user: username,
    text
  });

  document.getElementById("msg").value = "";
}

room.child("chat").on("child_added", snap => {
  const d = snap.val();

  const div = document.createElement("div");
  div.className = "message";
  div.textContent = `${d.user}: ${d.text}`;

  document.getElementById("chatBox").appendChild(div);
});
</script>

</body>
</html>
